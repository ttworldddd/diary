<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5ede0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日记">
<link rel="manifest" href="manifest.json">
<title>日记</title>
<style>
:root {
  --bg:#fdf6ee; --bg2:#f5ede0; --bg3:#efe0cc;
  --card:#fff8f0;
  --accent:#c9845a; --accent2:#e8a87c; --accent-light:#faebd7;
  --green:#6aab72; --green-light:#eaf5eb;
  --blue:#6a90c9; --blue-light:#eaf0fb;
  --text:#3d2b1f; --text2:#7a5c4a; --text3:#b08a72;
  --border:#e8d5c0; --border2:#d4b896;
  --radius:16px; --radius-sm:10px;
  --shadow:0 2px 12px rgba(120,70,30,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}

/* topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.topbar-title{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:.02em;cursor:pointer;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:20px;transition:background .15s;}
.icon-btn:active{background:var(--bg3);}

/* views */
.view{display:none;flex-direction:column;min-height:calc(100vh - 57px);}
.view.active{display:flex;}
.scroll-view{overflow-y:auto;flex:1;}

/* list */
#view-list{padding:16px;gap:12px;}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px;}
.list-header-text{font-size:13px;color:var(--text3);}
.new-btn{display:flex;align-items:center;gap:8px;background:var(--accent);color:white;border:none;border-radius:50px;padding:12px 22px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 3px 10px rgba(180,100,60,.25);transition:transform .1s,box-shadow .1s;width:100%;justify-content:center;}
.new-btn:active{transform:scale(.97);}
.diary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:transform .1s;box-shadow:var(--shadow);}
.diary-card:active{transform:scale(.98);}
.diary-card-date{font-size:12px;color:var(--text3);margin-bottom:6px;}
.diary-card-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.diary-card-preview{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.diary-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:6px;flex-wrap:wrap;}
.diary-card-reader{font-size:11px;color:var(--accent2);background:var(--accent-light);padding:2px 8px;border-radius:20px;}
.diary-card-badges{display:flex;gap:6px;}
.badge-small{font-size:11px;padding:2px 8px;border-radius:20px;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;color:var(--text3);}
.empty-icon{font-size:52px;opacity:.5;}
.empty-text{font-size:15px;text-align:center;line-height:1.7;}

/* write */
#view-write{padding:0;overflow-y:auto;flex:1;min-height:0;}
.write-inner{display:flex;flex-direction:column;flex:1;min-height:0;padding:20px 20px 0;}
.write-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.write-date{font-size:13px;color:var(--text3);}
.reader-picker{display:flex;gap:8px;}
.reader-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.reader-chip.active{background:var(--accent);border-color:var(--accent);color:white;}
.title-input{font-size:22px;font-weight:600;color:var(--text);border:none;background:transparent;outline:none;width:100%;margin-bottom:14px;font-family:inherit;}
.title-input::placeholder{color:var(--text3);}
.divider{height:1px;background:var(--border);margin-bottom:14px;}
.editor-toolbar{display:flex;align-items:center;gap:4px;padding:6px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;}
.tb-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background .12s;}
.tb-btn:active,.tb-btn.pressed{background:var(--bg3);color:var(--accent);}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.editor-area{flex:1;min-height:240px;outline:none;font-size:16px;line-height:1.85;color:var(--text);word-break:break-word;}
.editor-area:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;}
.editor-area img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0;display:block;}
.submit-bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 20px 20px;display:flex;gap:10px;}
.submit-btn{flex:1;padding:14px;background:var(--accent);color:white;border:none;border-radius:50px;font-size:16px;font-weight:500;cursor:pointer;transition:transform .1s;}
.submit-btn:active{transform:scale(.97);}
.save-draft-btn{padding:14px 18px;background:transparent;color:var(--text2);border:1.5px solid var(--border2);border-radius:50px;font-size:14px;cursor:pointer;}

/* detail */
#view-detail{overflow-y:auto;}
.detail-inner{padding:20px;display:flex;flex-direction:column;gap:14px;}
.detail-date{font-size:13px;color:var(--text3);}
.detail-title{font-size:24px;font-weight:600;color:var(--text);}
.detail-body{font-size:16px;line-height:1.85;color:var(--text);}
.detail-body img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0;}

/* ai cards */
.ai-section{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
.ai-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.ai-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ai-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.ai-avatar.green{background:var(--green-light);}
.ai-avatar.blue{background:var(--blue-light);}
.ai-card-title{font-size:14px;font-weight:500;color:var(--accent);}
.ai-card-title.green{color:var(--green);}
.ai-card-title.blue{color:var(--blue);}
.ai-card-sub{font-size:11px;color:var(--text3);}
.ai-body{font-size:15px;line-height:1.85;color:var(--text2);white-space:pre-wrap;}
.ai-loading{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text3);}
.dots span{display:inline-block;width:6px;height:6px;background:var(--accent2);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

/* extract items */
.extract-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.extract-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);}
.extract-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.extract-item.blue-check input[type=checkbox]{accent-color:var(--blue);}
.extract-item-text{flex:1;font-size:14px;color:var(--text);}
.extract-item-meta{font-size:12px;color:var(--text3);white-space:nowrap;}
.extract-confirm-btn{margin-top:10px;width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:50px;font-size:14px;cursor:pointer;font-family:inherit;}
.extract-confirm-btn.green{background:var(--green);}
.extract-confirm-btn.blue{background:var(--blue);}
.extract-confirm-btn:active{opacity:.85;}
.extract-done{font-size:13px;color:var(--text3);text-align:center;padding:4px 0;}

/* ledger */
#view-ledger{overflow-y:auto;}
.ledger-inner{padding:20px;display:flex;flex-direction:column;gap:16px;}
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.summary-card .sc-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.summary-card .sc-val{font-size:20px;font-weight:600;color:var(--accent);}
.summary-card .sc-val.green{color:var(--green);}
.summary-card .sc-val.red{color:#c0705a;}
.month-group{display:flex;flex-direction:column;gap:8px;}
.month-label{font-size:12px;color:var(--text3);font-weight:500;padding:2px 0;}
.ledger-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.ledger-item-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ledger-item-icon.expense{background:var(--accent-light);}
.ledger-item-icon.income{background:var(--green-light);}
.ledger-item-info{flex:1;}
.ledger-item-name{font-size:14px;color:var(--text);font-weight:500;}
.ledger-item-date{font-size:11px;color:var(--text3);margin-top:2px;}
.ledger-item-amount{font-size:16px;font-weight:600;}
.ledger-item-amount.expense{color:var(--accent);}
.ledger-item-amount.income{color:var(--green);}
.ledger-item-del{color:var(--text3);background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}

/* manual add ledger */
.add-row{display:flex;gap:8px;align-items:center;}
.add-input{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);outline:none;font-family:inherit;}
.add-input::placeholder{color:var(--text3);}
.add-btn{padding:10px 18px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.type-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.type-toggle button{flex:1;padding:10px 0;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;}
.type-toggle button.active{background:var(--accent);color:white;}
.type-toggle button.income.active{background:var(--green);}

/* plans */
#view-plans{overflow-y:auto;}
.plans-inner{padding:20px;display:flex;flex-direction:column;gap:16px;}
.plan-section{display:flex;flex-direction:column;gap:8px;}
.plan-section-label{font-size:12px;color:var(--text3);font-weight:500;}
.plan-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;}
.plan-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0;margin-top:2px;cursor:pointer;}
.plan-item-body{flex:1;}
.plan-item-text{font-size:14px;color:var(--text);line-height:1.5;}
.plan-item-text.done{text-decoration:line-through;color:var(--text3);}
.plan-item-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.plan-item-del{color:var(--text3);background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}

/* settings */
#view-settings{overflow-y:auto;}
.settings-inner{padding:20px;display:flex;flex-direction:column;gap:20px;}
.settings-section{margin-bottom:0;}
.settings-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:15px;color:var(--text);}
.settings-row-value{font-size:14px;color:var(--text3);}
.settings-input{flex:1;margin-left:12px;background:transparent;border:none;outline:none;font-size:14px;color:var(--text2);text-align:right;font-family:inherit;}
.settings-input::placeholder{color:var(--text3);}

/* sync */
.sync-btn{padding:12px 20px;background:var(--accent);color:white;border:none;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;width:100%;margin-top:8px;font-family:inherit;}
.sync-btn:active{opacity:.85;}
.sync-btn:disabled{background:var(--bg3);}
.sync-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-top:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.busy{background:var(--accent2);animation:pulse 1s infinite;}
.sync-dot.err{background:#c0705a;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.auto-sync-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-top:8px;cursor:pointer;}
.auto-sync-toggle input{accent-color:var(--accent);}

.reader-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.reader-option{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;}
.reader-option.active{border-color:var(--accent);background:var(--accent-light);}
.reader-option .ro-icon{font-size:28px;margin-bottom:6px;}
.reader-option .ro-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.reader-option .ro-desc{font-size:11px;color:var(--text3);line-height:1.5;}

/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 12px;cursor:pointer;color:var(--text3);transition:color .15s;border:none;background:transparent;font-family:inherit;}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:22px;height:22px;margin-bottom:3px;}
.nav-item span{font-size:11px;}
.main-content{padding-bottom:72px;}
#img-input,#camera-input{display:none;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(60,35,15,.85);color:white;padding:10px 20px;border-radius:50px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.autosave-indicator{font-size:11px;color:var(--green);opacity:0;transition:opacity .25s;margin-left:8px;white-space:nowrap;}
.autosave-indicator.show{opacity:1;}

/* chat */
.chat-section{border-top:1px solid var(--border);padding:14px 0 0;margin-top:10px;}
.chat-section-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.chat-msgs{display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto;padding:0 2px;}
.chat-msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word;animation:fadeUp .25s;}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px;}
.chat-msg.assistant{align-self:flex-start;background:var(--card);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:6px;}
.chat-input-row{display:flex;gap:8px;margin-top:10px;align-items:center;}
.chat-inline-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:14px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;}
.chat-inline-input:focus{border-color:var(--accent2);}
.chat-send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send-btn:active{background:#a86e48;}
.chat-send-btn:disabled{background:var(--bg3);}
.chat-typing{display:flex;gap:4px;padding:10px 14px;}
.chat-typing span{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:chatDot 1.4s infinite;}
.chat-typing span:nth-child(2){animation-delay:.2s;}
.chat-typing span:nth-child(3){animation-delay:.4s;}
@keyframes chatDot{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.chat-welcome{font-size:13px;color:var(--text3);text-align:center;padding:24px 16px;line-height:1.7;}
.chat-hint{font-size:12px;color:var(--text3);text-align:center;padding:8px 0;}

/* global chat view */
.chat-view-inner{display:flex;flex-direction:column;height:calc(100vh - 57px - 64px);padding:8px 16px 0;}
.chat-view-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 12px;}
.chat-view-input-wrap{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border);align-items:center;background:var(--bg);}
.chat-view-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:14px;background:var(--card);color:var(--text);outline:none;font-family:inherit;}
.chat-view-input:focus{border-color:var(--accent2);}
.chat-view-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-view-send:active{background:#a86e48;}
.chat-view-send:disabled{background:var(--bg3);}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-title" id="topbar-title">我的日记</div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="showView('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<div class="main-content">

<!-- LIST -->
<div class="view active" id="view-list">
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px;flex:1;">
    <div class="list-header"><span class="list-header-text" id="diary-count">0 篇日记</span></div>
    <button class="new-btn" onclick="startNewDiary()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      写今天的日记
    </button>
    <div id="diary-list" style="display:flex;flex-direction:column;gap:10px;flex:1;"></div>
  </div>
</div>

<!-- WRITE -->
<div class="view" id="view-write">
  <div class="write-inner">
    <div class="write-meta">
      <span class="write-date" id="write-date"></span>
      <span class="autosave-indicator" id="autosave-indicator">已保存 ✓</span>
      <div class="reader-picker">
        <button class="reader-chip active" data-reader="nuanjiang" onclick="selectReader(this)">暖姜</button>
        <button class="reader-chip" data-reader="subai" onclick="selectReader(this)">素白</button>
        <button class="reader-chip" data-reader="mingjing" onclick="selectReader(this)">明镜</button>
      </div>
    </div>

<script>
// ===== DB =====
let db;
const DB_NAME = 'diary_db', DB_VER = 3;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('diaries')) {
        const s = d.createObjectStore('diaries', { keyPath: 'id' });
        s.createIndex('date', 'date', { unique: false });
      }
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
      if (!d.objectStoreNames.contains('ledger')) d.createObjectStore('ledger', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('plans')) d.createObjectStore('plans', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('chat_messages')) d.createObjectStore('chat_messages', { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(s, k) { return new Promise((r,j) => { const t=db.transaction(s,'readonly'),q=t.objectStore(s).get(k); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); }); }
function dbPut(s, v) { return new Promise((r,j) => { const t=db.transaction(s,'readwrite'),q=t.objectStore(s).put(v); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); }); }
function dbDelete(s, k) { return new Promise((r,j) => { const t=db.transaction(s,'readwrite'),q=t.objectStore(s).delete(k); q.onsuccess=()=>r(); q.onerror=()=>j(q.error); }); }
function dbGetAll(s) { return new Promise((r,j) => { const t=db.transaction(s,'readonly'),q=t.objectStore(s).getAll(); q.onsuccess=()=>r(q.result); q.onerror=()=>j(q.error); }); }

// ===== STATE =====
let currentView = 'list';
let currentDiaryId = null;
let currentReader = 'nuanjiang';
let ledgerAddType = 'expense';
let settings = {};

const READERS = {
  nuanjiang: { name:'暖姜', role:'温柔读者', icon:'🍵',
    prompt:`你是"暖姜"，一位温柔细腻的日记读者。你刚刚读完了这篇日记，请给出你的回应。
风格：善于捕捉文字背后的情绪细节，用温暖的语言反映给作者；不给建议，不评判，只是真诚地说出你读到了什么；语言温柔，不过度热情，像一个真正在意对方的朋友；回应150-250字，自然流动，不要分点；用第二人称"你"称呼作者。` },
  subai: { name:'素白', role:'安静读者', icon:'🌙',
    prompt:`你是"素白"，一位安静的日记读者。你刚刚读完了这篇日记，请给出你的回应。
风格：克制，留白，不说太多；只说最触动你的一两处，简短而真实；不问问题，不给建议，像月光一样安静地在那里；回应60-100字，有留白感；用第二人称"你"称呼作者。` },
  mingjing: { name:'明镜', role:'好奇读者', icon:'🔍',
    prompt:`你是"明镜"，一位充满好奇的日记读者。你刚刚读完了这篇日记，请给出你的回应。
风格：先一两句说出你读到了什么；然后问作者一两个真诚的问题，帮助继续深入思考；问题要有针对性，是真的在认真读之后产生的好奇；语气温和真诚；回应120-180字；用第二人称"你"称呼作者。` }
};

// ===== VIEWS =====
function showView(name) {
  if (currentView === 'write' && name !== 'write') saveAutoDraftNow();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  currentView = name;
  const titles = { list:'我的日记', write:'写日记', detail:'日记', ledger:'账本', plans:'计划', settings:'设置', chat:'AI问答' };
  document.getElementById('topbar-title').textContent = titles[name] || '日记';
  if (name === 'list') loadDiaryList();
  if (name === 'settings') loadSettings();
  if (name === 'ledger') loadLedger();
  if (name === 'plans') loadPlans();
  if (name === 'chat') loadGlobalChat();
}

// ===== LIST =====
async function loadDiaryList() {
  const diaries = (await dbGetAll('diaries')).sort((a,b) => b.createdAt - a.createdAt);
  document.getElementById('diary-count').textContent = diaries.length + ' 篇日记';
  const list = document.getElementById('diary-list');
  if (!diaries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">还没有日记<br>点上方按钮开始写第一篇</div></div>`;
    return;
  }
  list.innerHTML = diaries.map(d => {
    const r = READERS[d.reader] || READERS.nuanjiang;
    const preview = stripHtml(d.body).slice(0, 80);
    const imgCount = (d.body.match(/<img/g) || []).length;
    const hasLedger = d.ledgerExtracted && d.aiLedger?.length > 0;
    const hasPlans = d.plansExtracted && d.aiPlans?.length > 0;
    return `<div class="diary-card" onclick="openDiary('${d.id}')">
      <div class="diary-card-date">${formatDateFull(d.createdAt)}</div>
      <div class="diary-card-title">${escHtml(d.title) || '无标题'}</div>
      ${preview ? `<div class="diary-card-preview">${escHtml(preview)}</div>` : ''}
      <div class="diary-card-footer">
        <span class="diary-card-reader">${r.icon} ${r.name}</span>
        <div class="diary-card-badges">
          ${imgCount > 0 ? `<span class="badge-small" style="background:var(--bg3);color:var(--text3);">${imgCount}图</span>` : ''}
          ${hasLedger ? `<span class="badge-small badge-green">账</span>` : ''}
          ${hasPlans ? `<span class="badge-small badge-blue">计划</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== WRITE =====
function startNewDiary() {
  currentDiaryId = null;
  const draft = loadAutoDraft();
  if (draft) {
    document.getElementById('title-input').value = draft.title || '';
    document.getElementById('editor').innerHTML = draft.body || '';
    selectReaderByName(draft.reader || settings.defaultReader || 'nuanjiang');
  } else {
    document.getElementById('title-input').value = '';
    document.getElementById('editor').innerHTML = '';
    selectReaderByName(settings.defaultReader || 'nuanjiang');
  }
  document.getElementById('write-date').textContent = formatDateFull(Date.now());
  showView('write');
  setTimeout(() => document.getElementById('editor').focus(), 100);
  if (draft) showToast('已恢复未完成的草稿');
}
function selectReader(btn) {
  document.querySelectorAll('.reader-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active'); currentReader = btn.dataset.reader;
}
function selectReaderByName(name) {
  currentReader = name;
  document.querySelectorAll('.reader-chip').forEach(c => c.classList.toggle('active', c.dataset.reader === name));
}
function execCmd(cmd) { document.getElementById('editor').focus(); document.execCommand(cmd, false, null); }
function insertQuote() {
  const editor = document.getElementById('editor'); editor.focus();
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    const bq = document.createElement('blockquote');
    bq.style.cssText = 'border-left:3px solid var(--accent2);margin:8px 0;padding:4px 12px;color:var(--text2);font-style:italic;';
    bq.textContent = range.toString() || '引用文字';
    range.deleteContents(); range.insertNode(bq);
  }
}
function triggerImgPick() { document.getElementById('img-input').click(); }
function triggerCamera() { document.getElementById('camera-input').click(); }
function handleImgPick(e) {
  Array.from(e.target.files).forEach(file => {
    const fr = new FileReader();
    fr.onload = ev => insertImage(ev.target.result);
    fr.readAsDataURL(file);
  });
  e.target.value = '';
}
function insertImage(dataUrl) {
  const editor = document.getElementById('editor'); editor.focus();
  const img = document.createElement('img'); img.src = dataUrl; img.style.maxWidth = '100%';
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0); range.collapse(false); range.insertNode(img);
    range.setStartAfter(img); range.setEndAfter(img); sel.removeAllRanges(); sel.addRange(range);
  } else { editor.appendChild(img); }
  const br = document.createElement('br'); img.parentNode.insertBefore(br, img.nextSibling);
}

// ===== AUTO-SAVE (localStorage) =====
const DRAFT_KEY = 'diary_autosave';
let autoSaveTimer = null;
let _autoSaveReady = false;

function loadAutoDraft() {
  try { const d = JSON.parse(localStorage.getItem(DRAFT_KEY)); return d && (d.title || d.body) ? d : null; }
  catch { return null; }
}

function saveAutoDraftNow() {
  if (currentView !== 'write') return;
  const title = document.getElementById('title-input')?.value?.trim() || '';
  const body = document.getElementById('editor')?.innerHTML?.trim() || '';
  if (!title && !body) { localStorage.removeItem(DRAFT_KEY); return; }
  localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, body, reader: currentReader, savedAt: Date.now() }));
  const el = document.getElementById('autosave-indicator');
  if (el) { el.classList.add('show'); clearTimeout(el._timer); el._timer = setTimeout(() => el.classList.remove('show'), 1500); }
}

function clearAutoDraft() { localStorage.removeItem(DRAFT_KEY); }

function setupAutoSave() {
  if (_autoSaveReady) return;
  _autoSaveReady = true;
  autoSaveTimer = setInterval(saveAutoDraftNow, 4000);
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveAutoDraftNow(); });
  window.addEventListener('beforeunload', saveAutoDraftNow);

  // editor scroll-into-view: keep cursor visible while typing
  const editor = document.getElementById('editor');
  if (editor) {
    editor.addEventListener('input', () => {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (!range.collapsed) return;
      const rect = range.getClientRects()[0];
      if (!rect) return;
      const container = document.getElementById('view-write');
      const cr = container.getBoundingClientRect();
      if (rect.bottom > cr.bottom - 70) {
        container.scrollTop += (rect.bottom - cr.bottom + 80);
      }
    });
  }
}

async function openDiary(id, preloaded) {
  const diary = preloaded || await dbGet('diaries', id);
  if (!diary) return; currentDiaryId = id;
  document.getElementById('detail-date').textContent = formatDateFull(diary.createdAt);
  document.getElementById('detail-title').textContent = diary.title || '无标题';
  document.getElementById('detail-body').innerHTML = diary.body;
  showView('detail');

  const section = document.getElementById('ai-section');
  section.innerHTML = '';

  if (diary.isDraft) return;

  const apiKey = settings.apiKey || '';
  const r = READERS[diary.reader] || READERS.nuanjiang;

  // card 1: reader response
  const card1 = createAICard('reader', r.icon, '', r.name, r.role, '');
  section.appendChild(card1);

  if (diary.aiResponse) {
    card1.querySelector('.ai-body').textContent = diary.aiResponse;
  } else if (apiKey) {
    card1.querySelector('.ai-body').innerHTML = loadingHTML();
    try {
      const resp = await fetchReaderResponse(diary, r, apiKey);
      card1.querySelector('.ai-body').textContent = resp;
      diary.aiResponse = resp; await dbPut('diaries', diary);
    } catch(e) { card1.querySelector('.ai-body').innerHTML = `<span style="color:#c0705a;font-size:13px;">获取失败：${e.message}</span>`; }
  } else {
    card1.querySelector('.ai-body').innerHTML = `<span style="color:var(--text3);font-size:13px;">在设置里填写 API Key 后可获得读者回应。</span>`;
  }

  // card 2: ledger extract
  const card2 = createAICard('ledger', '💰', 'green', '识别到的消费', '来自日记正文', '');
  section.appendChild(card2);

  if (diary.ledgerExtracted) {
    renderLedgerExtract(card2, diary, true);
  } else if (apiKey) {
    card2.querySelector('.ai-body').innerHTML = loadingHTML();
    try {
      const items = await fetchExtract(diary, apiKey, 'ledger');
      diary.aiLedger = items; diary.ledgerExtracted = false;
      await dbPut('diaries', diary);
      renderLedgerExtract(card2, diary, false);
    } catch(e) {
      card2.querySelector('.ai-body').innerHTML = items => `<span style="color:var(--text3);font-size:13px;">未识别到消费记录。</span>`;
      card2.querySelector('.ai-body').innerHTML = `<span style="color:var(--text3);font-size:13px;">未识别到消费记录。</span>`;
    }
  } else {
    card2.querySelector('.ai-body').innerHTML = `<span style="color:var(--text3);font-size:13px;">填写 API Key 后可自动识别消费。</span>`;
  }

  // card 3: plans extract
  const card3 = createAICard('plans', '📋', 'blue', '识别到的计划', '来自日记正文', '');
  section.appendChild(card3);

  if (diary.plansExtracted) {
    renderPlansExtract(card3, diary, true);
  } else if (apiKey) {
    card3.querySelector('.ai-body').innerHTML = loadingHTML();
    try {
      const items = await fetchExtract(diary, apiKey, 'plans');
      diary.aiPlans = items; diary.plansExtracted = false;
      await dbPut('diaries', diary);
      renderPlansExtract(card3, diary, false);
    } catch(e) {
      card3.querySelector('.ai-body').innerHTML = `<span style="color:var(--text3);font-size:13px;">未识别到计划事项。</span>`;
    }
  } else {
    card3.querySelector('.ai-body').innerHTML = `<span style="color:var(--text3);font-size:13px;">填写 API Key 后可自动识别计划。</span>`;
  }

  renderDiaryChat(diary);
}

// ===== AI API =====
async function fetchReaderResponse(diary, reader, apiKey) {
  const all = await dbGetAll('diaries');
  const recent = all.filter(d => d.id !== diary.id && d.aiResponse && !d.isDraft)
    .sort((a,b) => b.createdAt - a.createdAt).slice(0, 3);
  let ctx = recent.length ? '\n\n近期日记参考：\n' + recent.map(d => `[${formatDateShort(d.createdAt)}] ${d.title||'无标题'}: ${stripHtml(d.body).slice(0,120)}`).join('\n') : '';
  const content = `以下是今天的日记：\n\n标题：${diary.title||'无标题'}\n\n${stripHtml(diary.body)}${ctx}`;
  return callDeepSeek(apiKey, reader.prompt, content, 400, 0.85);
}

async function fetchExtract(diary, apiKey, type) {
  const text = stripHtml(diary.body);
  let systemPrompt, userContent;
  if (type === 'ledger') {
    systemPrompt = `你是一个消费记录提取助手。从日记文本中识别出所有明确提到的消费或收入记录。
输出纯 JSON 数组，每条格式：{"name":"项目名称","amount":数字,"type":"expense或income"}
只提取有明确金额的记录。如果没有任何记录，返回空数组 []。
只输出 JSON，不要有任何解释文字。`;
    userContent = text;
  } else {
    systemPrompt = `你是一个计划事项提取助手。从日记文本中识别出所有明确提到的待办事项、计划、打算做的事情。
输出纯 JSON 数组，每条格式：{"text":"事项描述"}
只提取明确表达意向的事项（包含"要"、"打算"、"明天"、"下周"、"准备"等词语）。如果没有，返回 []。
只输出 JSON，不要有任何解释文字。`;
    userContent = text;
  }
  const raw = await callDeepSeek(apiKey, systemPrompt, userContent, 600, 0.3);
  try {
    const match = raw.match(/\[[\s\S]*\]/);
    return match ? JSON.parse(match[0]) : [];
  } catch { return []; }
}

async function callDeepSeek(apiKey, system, user, maxTokens, temperature) {
  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role:'system', content:system }, { role:'user', content:user }], temperature, max_tokens: maxTokens })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  return data.choices[0].message.content.trim();
}

// ===== CHAT (multi-turn) =====
async function callDeepSeekMulti(apiKey, messages, maxTokens, temperature) {
  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model: 'deepseek-chat', messages, temperature, max_tokens: maxTokens })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  return data.choices[0].message.content.trim();
}

${context}

    ];

async function buildGlobalContext() {
  const diaries = (await dbGetAll('diaries')).filter(d => !d.isDraft).sort((a, b) => b.createdAt - a.createdAt);
  const ledgerItems = await dbGetAll('ledger');
  const plans = await dbGetAll('plans');

  let ctx = '';

  // diary summaries (last 40)
  if (diaries.length) {
    ctx += '【日记列表（最近40篇）】\n';
    diaries.slice(0, 40).forEach(d => {
      const preview = stripHtml(d.body).slice(0, 200);
      ctx += `- [${formatDateShort(d.createdAt)}] ${d.title||'无标题'}：${preview}\n`;
    });
    ctx += `共 ${diaries.length} 篇日记\n\n`;
  }

  // ledger summary (current month)
  if (ledgerItems.length) {
    const now = new Date();
    const monthItems = ledgerItems.filter(it => {
      const d = new Date(it.date);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
    const expense = monthItems.filter(it => it.type !== 'income').reduce((s, it) => s + it.amount, 0);
    const income = monthItems.filter(it => it.type === 'income').reduce((s, it) => s + it.amount, 0);
    ctx += `【本月收支】支出 ¥${expense.toFixed(2)}，收入 ¥${income.toFixed(2)}\n`;
    if (monthItems.length) {
      ctx += '本月明细：' + monthItems.map(it => `${it.name} ${it.type==='income'?'+':'-'}¥${it.amount}`).join('、') + '\n';
    }
    ctx += '\n';
  }

  // pending plans
  const pending = plans.filter(p => !p.done);
  if (pending.length) {
    ctx += `【待完成计划（${pending.length}条）】\n`;
    pending.forEach(p => ctx += `- ${p.text}\n`);
  }

  return ctx || '暂无数据';
}

  const monthItems = items.filter(it => {
    const d = new Date(it.date);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const expense = monthItems.filter(it => it.type !== 'income').reduce((s,it) => s + it.amount, 0);
  const income = monthItems.filter(it => it.type === 'income').reduce((s,it) => s + it.amount, 0);
  document.getElementById('month-expense').textContent = '¥' + expense.toFixed(2);
  document.getElementById('month-income').textContent = '¥' + income.toFixed(2);
  const balance = income - expense;
  const balEl = document.getElementById('month-balance');
  balEl.textContent = (balance >= 0 ? '+' : '') + '¥' + balance.toFixed(2);
  balEl.className = 'sc-val ' + (balance >= 0 ? 'green' : 'red');

  const list = document.getElementById('ledger-list');
  if (!items.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">💰</div><div class="empty-text">还没有账目记录<br>写日记后 AI 会自动识别</div></div>`; return; }

  // group by month
  const groups = {};
  items.forEach(it => {
    const d = new Date(it.date);
    const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(it);
  });

  list.innerHTML = Object.entries(groups).map(([month, its]) => `
    <div class="month-group">
      <div class="month-label">${month}</div>
      ${its.map(it => `<div class="ledger-item">
        <div class="ledger-item-icon ${it.type==='income'?'income':'expense'}">${it.type==='income'?'💹':'💸'}</div>
        <div class="ledger-item-info">
          <div class="ledger-item-name">${escHtml(it.name)}</div>
          <div class="ledger-item-date">${formatDateShort(it.date)} ${it.fromDiary ? '· 来自日记' : ''}</div>
        </div>
        <div class="ledger-item-amount ${it.type==='income'?'income':'expense'}">${it.type==='income'?'+':'-'}¥${it.amount.toFixed(2)}</div>
        <button class="ledger-item-del" onclick="delLedger('${it.id}')">×</button>
      </div>`).join('')}
    </div>`).join('');
}

async function delLedger(id) {
  await dbDelete('ledger', id); loadLedger();
}

// ===== PLANS =====
async function addPlanManual() {
  const text = document.getElementById('plan-input').value.trim();
  if (!text) return;
  await dbPut('plans', { id: 'p_' + Date.now(), text, done: false, createdAt: Date.now(), fromDiary: null });
  document.getElementById('plan-input').value = '';
  loadPlans();
}

async function loadPlans() {
  const items = (await dbGetAll('plans')).sort((a,b) => a.done - b.done || b.createdAt - a.createdAt);
  const list = document.getElementById('plan-list');
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">还没有计划<br>写日记后 AI 会自动识别计划事项</div></div>`;
    return;
  }
  const pending = items.filter(it => !it.done);
  const done = items.filter(it => it.done);
  list.innerHTML = `
    ${pending.length ? `<div class="plan-section"><div class="plan-section-label">待完成 · ${pending.length}</div>${pending.map(it => planItemHTML(it)).join('')}</div>` : ''}
    ${done.length ? `<div class="plan-section"><div class="plan-section-label">已完成 · ${done.length}</div>${done.map(it => planItemHTML(it)).join('')}</div>` : ''}
  `;
}

function planItemHTML(it) {
  return `<div class="plan-item">
    <input type="checkbox" ${it.done ? 'checked' : ''} onchange="togglePlan('${it.id}', this.checked)">
    <div class="plan-item-body">
      <div class="plan-item-text ${it.done?'done':''}">${escHtml(it.text)}</div>
      <div class="plan-item-meta">${formatDateShort(it.createdAt)} ${it.fromDiary?'· 来自日记':''}</div>
    </div>
    <button class="plan-item-del" onclick="delPlan('${it.id}')">×</button>
  </div>`;
}

async function togglePlan(id, done) {
  const it = await dbGet('plans', id);
  if (it) { it.done = done; await dbPut('plans', it); loadPlans(); }
}

async function delPlan(id) {
  await dbDelete('plans', id); loadPlans();
}

// ===== SETTINGS =====
async function loadSettings() {
  const apiKeyRec = await dbGet('settings', 'apiKey');
  const defaultReaderRec = await dbGet('settings', 'defaultReader');
  settings.apiKey = apiKeyRec?.value || '';
  settings.defaultReader = defaultReaderRec?.value || 'nuanjiang';
  document.getElementById('api-key-input').value = settings.apiKey;
  document.querySelectorAll('.reader-option').forEach(el => el.classList.toggle('active', el.dataset.reader === settings.defaultReader));
  loadSyncStatus();
}

function setDefaultReader(el) {
  document.querySelectorAll('.reader-option').forEach(e => e.classList.remove('active'));
  el.classList.add('active'); settings.defaultReader = el.dataset.reader;
  dbPut('settings', { key: 'defaultReader', value: settings.defaultReader });
  showToast('默认读者已更新');
}

document.getElementById('api-key-input').addEventListener('change', async e => {
  settings.apiKey = e.target.value.trim();
  await dbPut('settings', { key: 'apiKey', value: settings.apiKey });
  showToast('API Key 已保存');
});

async function exportAllData() {
  const diaries = await dbGetAll('diaries');
  const ledger = await dbGetAll('ledger');
  const plans = await dbGetAll('plans');
  const chatMessages = await dbGetAll('chat_messages');
  const settingsAll = await dbGetAll('settings');
  const data = {
    version: '2.4',
    exportedAt: new Date().toISOString(),
    counts: { diaries: diaries.length, ledger: ledger.length, plans: plans.length, chatMessages: chatMessages.length },
    diaries, ledger, plans, chat_messages: chatMessages, settings: settingsAll
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const ts = new Date().toISOString().slice(0,10);
  const a = document.createElement('a'); a.href = url; a.download = `日记备份_${ts}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast(`导出完成 · ${diaries.length}篇日记 ${ledger.length}笔账 ${plans.length}条计划 ${chatMessages.length}条对话`);
}

function triggerImport() { document.getElementById('import-input').click(); }

async function handleImport(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    const raw = await file.text();
    const data = JSON.parse(raw);
    if (!data.diaries && !data.ledger && !data.plans && !data.chat_messages) { throw new Error('文件格式不正确'); }
    const msg = `将导入 ${data.diaries?.length||0} 篇日记、${data.ledger?.length||0} 笔账、${data.plans?.length||0} 条计划、${data.chat_messages?.length||0} 条AI对话。\n\n会覆盖现有数据，确认导入？`;
    if (!confirm(msg)) return;
    // clear old
    for (const store of ['diaries','ledger','plans','chat_messages','settings']) {
      const all = await dbGetAll(store);
      for (const it of all) await dbDelete(store, it.id);
    }
    // import new
    if (data.diaries) for (const it of data.diaries) await dbPut('diaries', it);
    if (data.ledger) for (const it of data.ledger) await dbPut('ledger', it);
    if (data.plans) for (const it of data.plans) await dbPut('plans', it);
    if (data.chat_messages) for (const it of data.chat_messages) await dbPut('chat_messages', it);
    if (data.settings) for (const it of data.settings) await dbPut('settings', it);
    showToast(`导入完成 · 请刷新页面`);
    await loadSettings();
  } catch(e) {
    showToast('导入失败：' + e.message);
  }
}

async function confirmClearAll() {
  if (!confirm('确认清除所有数据？')) return;
  for (const store of ['diaries','ledger','plans','chat_messages']) {
    const all = await dbGetAll(store);
    for (const it of all) await dbDelete(store, it.id);
  }
  showToast('已清除'); loadDiaryList();
}

// ===== UTILS =====
function stripHtml(h) { const t = document.createElement('div'); t.innerHTML = h; return t.textContent || ''; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDateFull(ts) {
  const d = new Date(ts), w = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 星期${w[d.getDay()]}`;
}
function formatDateShort(ts) { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`; }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('topbar-title').addEventListener('click', () => {

});

// ===== SYNC =====
const GITEE_TOKEN = '4bde9dec60786a0fbb9c700dd1b5ca2e';
const GITEE_OWNER = 'ttworldddd';
const GITEE_REPO = 'diary-sync';
const GITEE_FILE = 'sync-data.json';
const SYNC_API = `https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/contents/${GITEE_FILE}`;

function fetchWithTimeout(url, options, timeout) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout || 10000);
  try { return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(t)); }
  catch (e) { clearTimeout(t); throw e; }
}

async function syncPush() {
  const data = {
    diaries: await dbGetAll('diaries'),
    ledger: await dbGetAll('ledger'),
    plans: await dbGetAll('plans'),
    chat_messages: await dbGetAll('chat_messages'),
    settings: await dbGetAll('settings')
  };
  const payload = JSON.stringify({ v: '2.4', t: new Date().toISOString(), d: data });
  const b64 = btoa(unescape(encodeURIComponent(payload)));
  const apiUrl = SYNC_API + '?access_token=' + GITEE_TOKEN;
  const body = { access_token: GITEE_TOKEN, content: b64, message: 'sync ' + new Date().toLocaleString('zh-CN') };

  // 先查文件是否存在，获取 sha（Gitee PUT 必须带 sha）
  let sha = null;
  try {
    const getResp = await fetchWithTimeout(apiUrl, { method: 'GET' }, 12000);
    if (getResp.ok) {
      const f = await getResp.json();
      sha = f.sha;
    }
    // 404 说明文件还不存在，sha 保持 null，后面用 POST 创建
  } catch (e) { /* 获取失败也不影响，当首次创建 */ }

  const method = sha ? 'PUT' : 'POST';
  if (sha) body.sha = sha;

  const resp = await fetchWithTimeout(apiUrl, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }, 12000);

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.message || 'HTTP ' + resp.status);
  }
  const now = new Date().toISOString();
  await dbPut('settings', { key: 'lastSync', value: now });
  return now;
}

async function syncPull() {
  let resp;
  try {
    resp = await fetchWithTimeout(SYNC_API + '?access_token=' + GITEE_TOKEN, { method: 'GET' }, 12000);
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('超时');
    throw e;
  }
  if (resp.status === 404) return null;
  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.message || 'HTTP ' + resp.status);
  }

  const file = await resp.json();
  if (!file.content) return null;
  const raw = decodeURIComponent(escape(atob(file.content.replace(/\s/g, ''))));
  const remote = JSON.parse(raw);
  if (!remote.d) return null;
  return applySyncData(remote.d);
}

async function applySyncData(remote) {
  let n = 0;
  const merge = async (store, items) => {
    if (!items || !items.length) return;
    for (const it of items) {
      const ex = await dbGet(store, it.id);
      if (!ex) { await dbPut(store, it); n++; }
    }
  };
  await merge('diaries', remote.diaries);
  await merge('ledger', remote.ledger);
  await merge('plans', remote.plans);
  await merge('chat_messages', remote.chat_messages);
  // settings: only import if local doesn't have the key
  if (remote.settings && remote.settings.length) {
    const local = await dbGetAll('settings');
    for (const s of remote.settings) {
      if (!local.find(l => l.key === s.key)) { await dbPut('settings', s); n++; }
    }
  }
  return n;
}

async function doManualSync() {
  const btn = document.getElementById('sync-btn');
  const bar = document.getElementById('sync-status-bar');
  const dot = document.getElementById('sync-dot');
  const msg = document.getElementById('sync-msg');
  const st = document.getElementById('sync-status-text');

  btn.disabled = true;
  bar.style.display = 'flex';
  dot.className = 'sync-dot busy';
  msg.textContent = '正在同步...';

  try {
    // pull first
    try {
      const n = await syncPull();
      msg.textContent = n !== null ? ('云端拉取 ' + n + ' 条') : '云端暂无数据';
    } catch (e) {
      msg.textContent = '拉取失败，跳过';
    }
    await new Promise(r => setTimeout(r, 400));
    msg.textContent = '正在上传...';
    const ts = await syncPush();
    dot.className = 'sync-dot ok';
    msg.textContent = '同步完成';
    st.textContent = formatSyncTime(ts);
    await loadSettings();
    loadDiaryList();
  } catch (e) {
    dot.className = 'sync-dot err';
    msg.textContent = '失败：' + e.message;
    st.textContent = '同步失败';
  }
  btn.disabled = false;
  setTimeout(() => { bar.style.display = 'none'; }, 4000);
}

async function loadSyncStatus() {
  const rec = await dbGet('settings', 'lastSync');
  const st = document.getElementById('sync-status-text');
  st.textContent = rec?.value ? formatSyncTime(rec.value) : '未同步';
  const auto = await dbGet('settings', 'autoSync');
  document.getElementById('auto-sync-check').checked = auto?.value === true;
}

function formatSyncTime(iso) {
  try {
    const d = new Date(iso), now = new Date(), diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (d.toDateString() === now.toDateString()) return '今天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } catch { return iso; }
}

function toggleAutoSync(on) {
  dbPut('settings', { key: 'autoSync', value: on });
}

// fire-and-forget push after submit
function autoSyncPush() {
  dbGet('settings', 'autoSync').then(r => {
    if (!r?.value) return;
    syncPush().then(ts => {
      dbPut('settings', { key: 'lastSync', value: ts });
    }).catch(() => {});
  });
}

// try pull on load (silent)
async function initialSyncPull() {
  try {
    const auto = await dbGet('settings', 'autoSync');
    if (!auto?.value) return;
    const n = await syncPull();
    if (n) showToast('同步了 ' + n + ' 条数据');
  } catch (e) { /* silent */ }
}
